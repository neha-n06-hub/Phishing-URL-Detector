<!DOCTYPE html>
<html>
<head>

<title>AI Phishing URL Detector</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>🛡️ AI Phishing URL Detector</h1>

<form action="/predict" method="POST">

<input
type="text"
name="url"
placeholder="Enter Website URL..."
required>

<button>Check URL</button>

</form>

{% if prediction %}

<div class="result">

<h2>{{ prediction }}</h2>

<p>{{ url }}</p>

</div>

{% endif %}

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
